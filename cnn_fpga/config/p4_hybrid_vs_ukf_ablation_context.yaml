# Hybrid vs UKF ablation：
# - 测试时间上下文长度的重要性

experiment:
  name: p4_hybrid_vs_ukf_ablation_context_v1
  stage: p4_ablation_context
  seed: 20260404

base_config: p4_multiscenario_hybrid_b_long.yaml

p4_benchmark:
  protocol:
    protocol_id: p4_hybrid_vs_ukf_ablation_context_v1
    frozen_baseline_set: [ukf, hybrid_ctx1, hybrid_ctx3, hybrid_ctx5]

  modes:
    - name: ukf
      label: UKF
      slow_loop_mode: ukf
      overrides:
        slow_loop:
          ukf:
            initial_velocity_std_sigma: 0.008
            initial_velocity_std_mu_q: 0.008
            initial_velocity_std_mu_p: 0.008
            initial_velocity_std_theta_deg: 0.6
            process_std_sigma: 0.006
            process_std_mu_q: 0.006
            process_std_mu_p: 0.006
            process_std_theta_deg: 0.45
            process_std_v_sigma: 0.0015
            process_std_v_mu_q: 0.0015
            process_std_v_mu_p: 0.0015
            process_std_v_theta_deg: 0.12

    - name: hybrid_ctx1
      label: Hybrid Ctx1
      slow_loop_mode: hybrid_residual_b
      artifact_selector: latest_float
      overrides:
        paths:
          model_dir: artifacts/models/runtime_b_residual_ctx1_v1
        slow_loop:
          inference_service:
            label_names: [b_q, b_p]
          hybrid_residual_b:
            teacher_mode: window_variance
            context_windows: 1
            context_padding: edge_repeat
            include_histogram_deltas: false
            include_teacher_prediction: true
            include_teacher_params: true
            include_teacher_deltas: true
            residual_scale_b: 1.0
            residual_clip_b: 0.12
            ema_alpha: 0.35
            ema_apply_to: b

    - name: hybrid_ctx3
      label: Hybrid Ctx3
      slow_loop_mode: hybrid_residual_b
      artifact_selector: latest_float
      overrides:
        paths:
          model_dir: artifacts/models/runtime_b_residual_ctx3_v1
        slow_loop:
          inference_service:
            label_names: [b_q, b_p]
          hybrid_residual_b:
            teacher_mode: window_variance
            context_windows: 3
            context_padding: edge_repeat
            include_histogram_deltas: true
            include_teacher_prediction: true
            include_teacher_params: true
            include_teacher_deltas: true
            residual_scale_b: 1.0
            residual_clip_b: 0.12
            ema_alpha: 0.35
            ema_apply_to: b

    - name: hybrid_ctx5
      label: Hybrid Ctx5
      slow_loop_mode: hybrid_residual_b
      artifact_selector: latest_float
      overrides:
        paths:
          model_dir: artifacts/models/runtime_b_residual_v1
        slow_loop:
          inference_service:
            label_names: [b_q, b_p]
          hybrid_residual_b:
            teacher_mode: window_variance
            context_windows: 5
            context_padding: edge_repeat
            include_histogram_deltas: true
            include_teacher_prediction: true
            include_teacher_params: true
            include_teacher_deltas: true
            residual_scale_b: 1.0
            residual_clip_b: 0.12
            ema_alpha: 0.35
            ema_apply_to: b
