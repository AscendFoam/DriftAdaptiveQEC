# P3 参数调优实验第二轮：基于第一轮结果，只继续扫描 low-floor / alpha / beta
experiment:
  name: hardware_hil_overflow_tuning_v2
  stage: p3_hil_tuning

base_config: hardware_hil.yaml

paths:
  output_root: runs

tuning:
  baseline_candidate: baseline_current

  short_timing:
    n_slow_updates: 240
    n_fast_cycles: 960000

  confirm_timing:
    n_slow_updates: 900
    n_fast_cycles: 3600000

  selection:
    ler_tolerance_abs: 0.015
    confirm_top_k: 3

  # 第一轮结论：
  # - 压 `gain_clip` 上界到 0.8 以下没有稳定降低 overflow；
  # - 因此第二轮固定上界不动，集中检查：
  #   1. 低噪声区间的最小增益 floor 是否过高；
  #   2. 偏置强度 alpha 是否过大；
  #   3. 平滑系数 beta 是否让参数跟踪过于积极。
  candidates:
    - name: baseline_current
      gain_clip: [0.20, 1.20]
      beta_smoothing: 0.20
      alpha_bias: 1.00
      backend: mock
      slow_loop_mode: model_artifact
      artifact_selector: latest_float
      inference_service_mode: subprocess
      inference_backend: artifact_npz

    - name: lowfloor_only
      gain_clip: [0.10, 1.20]
      beta_smoothing: 0.20
      alpha_bias: 1.00
      backend: mock
      slow_loop_mode: model_artifact
      artifact_selector: latest_float
      inference_service_mode: subprocess
      inference_backend: artifact_npz

    - name: lower_alpha
      gain_clip: [0.20, 1.20]
      beta_smoothing: 0.20
      alpha_bias: 0.90
      backend: mock
      slow_loop_mode: model_artifact
      artifact_selector: latest_float
      inference_service_mode: subprocess
      inference_backend: artifact_npz

    - name: lowfloor_lower_alpha
      gain_clip: [0.10, 1.20]
      beta_smoothing: 0.20
      alpha_bias: 0.90
      backend: mock
      slow_loop_mode: model_artifact
      artifact_selector: latest_float
      inference_service_mode: subprocess
      inference_backend: artifact_npz

    - name: lower_beta
      gain_clip: [0.20, 1.20]
      beta_smoothing: 0.15
      alpha_bias: 1.00
      backend: mock
      slow_loop_mode: model_artifact
      artifact_selector: latest_float
      inference_service_mode: subprocess
      inference_backend: artifact_npz

    - name: lowfloor_lower_beta
      gain_clip: [0.10, 1.20]
      beta_smoothing: 0.15
      alpha_bias: 1.00
      backend: mock
      slow_loop_mode: model_artifact
      artifact_selector: latest_float
      inference_service_mode: subprocess
      inference_backend: artifact_npz

    - name: lower_alpha_beta
      gain_clip: [0.20, 1.20]
      beta_smoothing: 0.15
      alpha_bias: 0.90
      backend: mock
      slow_loop_mode: model_artifact
      artifact_selector: latest_float
      inference_service_mode: subprocess
      inference_backend: artifact_npz

    - name: balanced_lowfloor_alpha_beta
      gain_clip: [0.10, 1.20]
      beta_smoothing: 0.15
      alpha_bias: 0.90
      backend: mock
      slow_loop_mode: model_artifact
      artifact_selector: latest_float
      inference_service_mode: subprocess
      inference_backend: artifact_npz
